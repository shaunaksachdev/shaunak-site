      ════════════════════════════════════════════════════
      HOW TO ADD A BLOG POST
      ────────────────────────────────────────────────────
      1. Create a new file at posts/your-slug.html
      2. Duplicate the <article> template below, uncomment
         it, and fill in the date, title, link, and excerpt.
      3. Remove the empty-state div once you have posts.

      <article class="post-item">
        <time class="post-date" datetime="2026-09-01">September 1, 2026</time>
        <h2 class="post-title">
          <a href="posts/your-slug.html">Your Post Title</a>
        </h2>
        <p class="post-excerpt">
          One or two sentences describing what the post covers.
        </p>
